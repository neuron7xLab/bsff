version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns:
          - "numpy"
          - "scipy"
          - "statsmodels"
      python-devtools:
        patterns:
          - "pytest*"
          - "ruff"
          - "build"
      optional-evidence:
        patterns:
          - "pingouin"
          - "scikit-learn"
    labels:
      - "dependencies"
      - "automated"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
    open-pull-requests-limit: 5
    labels:
      - "github-actions"
      - "automated"
