name: Scientific validity issue
description: Challenge a statistical, methodological, or inferential claim in BSFF.
title: "[validity] "
labels: ["scientific-validity"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to challenge the *science*: a power claim, a null model, a
        threshold, an inference step, or a verdict that does not follow from the
        evidence. Concrete, reproducible challenges are first-class contributions.
  - type: textarea
    id: claim
    attributes:
      label: Which claim is in question?
      description: Quote the claim and where it appears (file, doc, or verdict).
    validations:
      required: true
  - type: textarea
    id: argument
    attributes:
      label: Why is it invalid (or under-supported)?
      description: State the methodological/statistical argument. Cite literature if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Deterministic steps, seeds, and expected vs observed behaviour.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Impact
      options:
        - Invalidates a SURVIVED verdict
        - Inflates false-positive rate
        - Breaks a stated threshold/power guarantee
        - Documentation/inference clarity
    validations:
      required: true
