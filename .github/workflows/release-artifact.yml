name: Release Artifact

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Top-level read-only; every write scope is declared on the job that needs it.
permissions:
  contents: read

jobs:
  build-attest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # OIDC for actions/attest-build-provenance
      attestations: write # write the GitHub build-provenance attestation
    outputs:
      # base64(sha256sum dist/*) — the subjects the SLSA generator signs.
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install -e '.[dev,leakage]'
      - run: python tools/generate_evidence_bundle.py
      - run: python tools/generate_provenance_manifest.py
      - run: python tools/validate_ip_provenance.py
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*
            artifacts/*.json
      - name: Hash distribution artifacts for SLSA provenance
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum ./* | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bsff-release-${{ github.ref_name }}
          path: |
            dist/*
            artifacts/*.json
            NOTICE
            CITATION.cff

  # SLSA Build L3 provenance. With upload-assets: true on a tag push this
  # attaches a `*.intoto.jsonl` provenance file to the GitHub release for the
  # tag — the asset OpenSSF Scorecard's Signed-Releases check scores 10/10.
  # NOTE: slsa-github-generator MUST be referenced by tag, not SHA: slsa-verifier
  # cannot verify a reusable workflow pinned by digest (ossf/scorecard#2174).
  provenance:
    needs: [build-attest]
    permissions:
      actions: read # read the workflow run for provenance
      id-token: write # Sigstore keyless signing via OIDC
      contents: write # upload the provenance asset to the release
    # slsa-verifier requires a tag, not a digest (ossf/scorecard#2174).
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: ${{ needs.build-attest.outputs.hashes }}
      provenance-name: bsff-${{ github.ref_name }}.intoto.jsonl
      upload-assets: true
