name: IP Provenance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,leakage]'
      - run: python tools/generate_evidence_bundle.py
      - run: python tools/generate_provenance_manifest.py
      - run: python tools/validate_ip_provenance.py
      - run: python tools/validate_architecture_contract.py
      - run: python tools/validate_truth_contract.py
      - run: python tools/check_github_actions_policy.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bsff-provenance-${{ github.sha }}
          path: |
            artifacts/evidence_manifest.json
            artifacts/provenance_manifest.json
            NOTICE
            CITATION.cff
          if-no-files-found: error
