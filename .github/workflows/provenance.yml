name: IP Provenance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,leakage]'
      - run: python tools/generate_evidence_bundle.py
      - run: python tools/generate_provenance_manifest.py
      - run: python tools/validate_ip_provenance.py
      - run: python tools/validate_architecture_contract.py
      - run: python tools/validate_truth_contract.py
      - run: python tools/check_github_actions_policy.py
      - uses: actions/upload-artifact@v4
        with:
          name: bsff-provenance-${{ github.sha }}
          path: |
            artifacts/evidence_manifest.json
            artifacts/provenance_manifest.json
            NOTICE
            CITATION.cff
          if-no-files-found: error
