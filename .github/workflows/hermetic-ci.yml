name: Hermetic CI

# A green badge is only trusted when the build is hermetic: dependencies are
# hash-pinned, the test runtime is offline, the wheel runs without network, and
# no evidence artifact drifts. Every install uses --require-hashes; every test job
# runs under the offline guard (tests/conftest.py).
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "41 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-lock-check:
    name: dependency-lock-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # Every requirement must be an exact == pin with a sha256 hash.
      - run: python tools/validate_lockfiles.py
      # And the pinned closure must actually resolve under --require-hashes.
      - run: python -m pip install --require-hashes --dry-run -r requirements/ci.lock

  offline-unit-tests:
    name: offline-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements/ci.lock
      - run: python -m pip install --no-deps -e .
      # The offline guard (tests/conftest.py) denies external network by default.
      - run: python -m pytest tests/ -m "not slow" --tb=short --disable-network

  offline-adversarial-tests:
    name: offline-adversarial-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements/ci.lock
      - run: python -m pip install --no-deps -e .
      - run: >
          python -m pytest
          tests/test_adversarial_operating_characteristics.py
          tests/test_verdict_engine_fuzz.py
          tests/property
          tests/adversarial
          -v --tb=short --disable-network

  wheel-offline-runtime:
    name: wheel-offline-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements/ci.lock
      - run: python -m pip install --no-deps -e .
      # Build the wheel and install it with --no-index/--no-deps: success proves it
      # runs without reaching any package index.
      - run: python tools/validate_wheel_runtime.py --offline
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: wheel-offline-validation
          path: artifacts/wheel_validation.json
          if-no-files-found: warn

  artifact-hash-check:
    name: artifact-hash-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements/ci.lock
      - run: python -m pip install --no-deps -e .
      # No evidence artifact may drift: manifest + SBOM must be reproducible.
      - run: python tools/generate_manifest.py --check
      - run: python tools/generate_sbom.py --check
