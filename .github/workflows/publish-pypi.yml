name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-dist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install twine
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: bsff-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: pypi-publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # One-time setup on pypi.org: register a Trusted Publisher (pending publisher)
    # for project "bsff" -> owner neuron7xLab, repo bsff, workflow publish-pypi.yml,
    # environment pypi. No API token is stored anywhere; auth is GitHub OIDC.
    environment:
      name: pypi
      url: https://pypi.org/p/bsff
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bsff-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
