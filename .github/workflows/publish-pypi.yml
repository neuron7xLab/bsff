name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-dist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install twine
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bsff-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: pypi-publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # One-time setup on pypi.org: register a Trusted Publisher (pending publisher)
    # for project "bsff" -> owner neuron7xLab, repo bsff, workflow publish-pypi.yml,
    # environment pypi. No API token is stored anywhere; auth is GitHub OIDC.
    environment:
      name: pypi
      url: https://pypi.org/p/bsff
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: bsff-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
