name: Publish to PyPI

on:
  release:
    types: [published]
  # Tag-push trigger: GitHub does NOT run workflows for `release: published`
  # events whose release was created by GITHUB_TOKEN (e.g. the SLSA generator in
  # release-artifact.yml creates the release as github-actions[bot]). A human
  # `git push` of a v* tag triggers this directly, so publishing no longer
  # depends on who created the GitHub release. The pre-publish gate still asserts
  # the tag matches the pyproject version.
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-dist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Pre-publish gates (refuse publish on stale truth / contradiction / tag mismatch)
        run: |
          python tools/validate_current_truth.py
          python tools/validate_truth_contract.py
          PV=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGV="${GITHUB_REF_NAME#v}"
            if [ "$TAGV" != "$PV" ]; then echo "tag $TAGV != pyproject $PV"; exit 1; fi
          fi
          echo "pre-publish gates OK (version $PV)"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install twine
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bsff-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: pypi-publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # One-time setup on pypi.org: register a Trusted Publisher (pending publisher)
    # for project "bsff" -> owner neuron7xLab, repo bsff, workflow publish-pypi.yml,
    # environment pypi. No API token is stored anywhere; auth is GitHub OIDC.
    environment:
      name: pypi
      url: https://pypi.org/p/bsff
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bsff-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
