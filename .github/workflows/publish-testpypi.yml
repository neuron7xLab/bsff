# SPDX-License-Identifier: GPL-3.0-or-later
name: publish-testpypi
# TestPyPI dry-run BEFORE real PyPI. Trusted Publishing (OIDC); no API token.
on:
  workflow_dispatch:
  push:
    tags: ["testpypi-v*"]

permissions:
  contents: read

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write          # OIDC for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -U pip build twine -e ".[dev,stats]"
      - name: Release gates (refuse publish on failure)
        run: |
          python tools/validate_current_truth.py
          python tools/validate_truth_contract.py
          bsff evidence verify
          python tools/generate_current_truth.py --check
      - name: Tag/version guard
        run: |
          PV=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "pyproject version: $PV"
          case "${GITHUB_REF_NAME}" in
            testpypi-v*) TAGV="${GITHUB_REF_NAME#testpypi-v}";;
            *) TAGV="$PV";;
          esac
          if [ "$TAGV" != "$PV" ]; then echo "tag $TAGV != pyproject $PV"; exit 1; fi
      - name: Build + check
        run: |
          python -m build
          python -m twine check dist/*
      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
