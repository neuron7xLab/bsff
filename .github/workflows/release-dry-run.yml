name: Release Dry Run

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate-dry-run:
    name: release-gate-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Locked, reproducible environment — the same forensic contour as the real
      # release gate, but PR-compatible and publish-free, so it can be a required
      # check. No cache (artifact-adjacent workflow; avoids cache-poisoning).
      - run: python -m pip install --upgrade pip uv build
      - run: uv sync --locked --all-extras --dev

      - run: uv run --no-sync python -m ruff check src tests tools
      - run: uv run --no-sync python -m ruff format --check src tests tools
      - run: uv run --no-sync python -m pytest tests/ -m "not slow" -v --tb=short
      - run: uv run --no-sync python -m pytest tests/ -m slow -v --tb=short

      - run: uv run --no-sync python tools/validate_truth_contract.py
      - run: uv run --no-sync python tools/generate_current_truth.py --check
      - run: uv run --no-sync python tools/validate_current_truth.py
      - run: uv run --no-sync python tools/validate_artifact_schema.py
      - run: uv run --no-sync python tools/update_status.py --check
      - run: uv run --no-sync python tools/generate_manifest.py --check
      - run: uv run --no-sync python tools/regenerate.py --check
      - run: uv run --no-sync bsff release-check --strict --output artifacts/release

      - run: uv run --no-sync --with build python -m build
      - run: uv run --no-sync python tools/generate_evidence_bundle.py

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bsff-dry-run-evidence
          path: |
            dist/
            artifacts/MANIFEST.json
            artifacts/evidence_manifest.json
          if-no-files-found: warn
