name: Release Dry Run

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate-dry-run:
    name: release-gate-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade pip uv build
      - run: uv sync --locked --all-extras --dev
      - name: Capture ruff diagnostics
        run: |
          mkdir -p artifacts/ci
          uv run --no-sync python -m ruff check src tests tools --output-format=json > artifacts/ci/ruff-check.json || true
          uv run --no-sync python -m ruff format --check src tests tools > artifacts/ci/ruff-format-check.txt 2>&1 || true
          uv run --no-sync python -m ruff format --diff src tests tools > artifacts/ci/ruff-format-diff.txt 2>&1 || true
      - run: uv run --no-sync python -m ruff check src tests tools
      - run: uv run --no-sync python -m ruff format --check src tests tools
      - name: Capture pytest diagnostics
        run: |
          mkdir -p artifacts/ci
          uv run --no-sync python -m pytest tests/ -m "not slow" -v --tb=short --junitxml=artifacts/ci/pytest-nonslow.xml > artifacts/ci/pytest-nonslow.txt 2>&1 || true
      - run: uv run --no-sync python -m pytest tests/ -m "not slow" -v --tb=short
      - run: uv run --no-sync python -m pytest tests/ -m slow -v --tb=short
      - run: uv run --no-sync python tools/validate_truth_contract.py
      - run: uv run --no-sync python tools/generate_current_truth.py --check
      - run: uv run --no-sync python tools/validate_current_truth.py
      - run: uv run --no-sync python tools/validate_forbidden_claims.py
      - run: uv run --no-sync python tools/validate_statistical_claims.py
      - run: uv run --no-sync python tools/validate_artifact_schema.py
      - run: uv run --no-sync python tools/update_status.py --check
      - run: uv run --no-sync python tools/update_status.py --verify-count --strict-status
      - run: uv run --no-sync python tools/generate_manifest.py --check
      - run: uv run --no-sync python tools/regenerate.py --check
      - run: uv run --no-sync bsff release-check --strict --output artifacts/release
      - run: uv run --no-sync --with build python -m build
      - run: uv run --no-sync python tools/generate_evidence_bundle.py

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bsff-dry-run-evidence
          path: |
            dist/
            artifacts/MANIFEST.json
            artifacts/evidence_manifest.json
            artifacts/ci/ruff-check.json
            artifacts/ci/ruff-format-check.txt
            artifacts/ci/ruff-format-diff.txt
            artifacts/ci/pytest-nonslow.txt
            artifacts/ci/pytest-nonslow.xml
          if-no-files-found: warn
