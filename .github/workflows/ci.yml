name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint-ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,stats,leakage]'
      - run: python -m pip install mypy==1.18.2 types-jsonschema types-PyYAML
      - run: python -m ruff check src tests tools
      - run: python -m ruff format --check src tests tools
      # Type gate: src/bsff must pass mypy --strict (config in pyproject.toml).
      - run: python -m mypy

  test:
    name: test-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    # The unit suite + the full post-test validator battery + coverage lands at
    # ~10 min on the slowest interpreter (3.12); 15 gives honest headroom so a
    # borderline run is not killed mid-validator and reported as a code failure.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      # stats (pingouin) is installed so the strict publication-grade evidence
      # path (JZS Bayes-factor corroboration) is genuinely exercised in CI, not
      # silently degraded to the BIC fallback.
      - run: python -m pip install -e '.[dev,leakage,stats,yaml]'
      # Heavy end-to-end cascade tests (each spawns many tool subprocesses) are
      # marked `slow` and run in the dedicated slow-tests job below, so this
      # matrix stays well within its 10-minute budget on every Python version.
      - run: python -m pytest tests/ -m "not slow" -v --tb=short --cov=bsff --cov-report=term-missing
      - run: bsff-validate --output artifacts/bsff_phase1_validation.json
      - run: bsff doctor --require-strict
      - run: python tools/validate_architecture_contract.py
      - run: python tools/validate_truth_contract.py
      - run: python tools/generate_current_truth.py --check
      - run: python tools/validate_current_truth.py
      - run: python tools/validate_forbidden_claims.py
      - run: python tools/validate_statistical_claims.py
      - run: python tools/validate_statistical_proof_gate.py --check
      - run: python tools/validate_release_notes.py
      - run: python tools/validate_open_source_readiness.py
      - run: python tools/check_github_actions_policy.py
      - run: python tools/scan_secrets.py
      - run: python tools/generate_provenance_manifest.py
      - run: python tools/validate_ip_provenance.py
      - run: python tools/validate_markdown.py
      - run: python tools/validate_tisean_reference.py
      - run: python tools/validate_real_eeg_case.py --check
      - run: python tools/update_status.py --check
      - run: python tools/update_status.py --verify-count --strict-status
      - run: python tools/generate_manifest.py --check
      - run: python tools/validate_artifact_schema.py
      - run: python tools/cluster_robust_specificity.py --check
      - run: python tools/analytic_uniformity_null.py --check
      - run: bsff release-check --strict --output artifacts/release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bsff-evidence-py${{ matrix.python-version }}
          path: |
            artifacts/bsff_phase1_validation.json
            artifacts/evidence_manifest.json
          if-no-files-found: error

  meta-verification:
    name: meta-verification
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Structural / meta gates are Python-version-independent, so they run once
    # here instead of x4 in the test matrix (where they blew the 10-min budget).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,leakage,stats,yaml]'
      - run: python tools/gate_soundness.py --check
      - run: python tools/lint_fail_open.py --check --include-src
      - run: python tools/claim_coverage.py --check
      - run: python tools/complexity_gate.py --check
      - run: python tools/determinism_probe.py --check
      - run: python tools/intent_contract.py --check
      - run: python tools/quality_dashboard.py --check --no-mypy

  slow-tests:
    name: slow-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,leakage,stats,yaml]'
      # The heavy cascade tests: controls, conformance, honesty gate, certificate,
      # demonstration/decision/core --check. No coverage (these are end-to-end
      # subprocess gates, not unit coverage targets) so the job stays fast.
      - run: python -m pytest tests/ -m slow -v --tb=short

  build:
    name: build-package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The evidence bundle must not be buildable from a test surface weaker than
    # the full one: the slow end-to-end cascade must pass before release artifacts.
    needs:
      - test
      - slow-tests
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      # Test the WHEEL, not only the editable source: build, install into a clean
      # venv (no PYTHONPATH/src), and exercise the CLI + evidence artifact from it.
      - run: python tools/validate_wheel_runtime.py
      - run: python -m pip install -e '.[dev,leakage]'
      - run: python tools/generate_evidence_bundle.py
      # Supply-chain inventory: a deterministic CycloneDX SBOM of the runtime
      # closure, structurally gated (root + name/version/purl + essentials).
      - run: python tools/generate_sbom.py --output artifacts/sbom.cdx.json
      - run: python tools/generate_sbom.py --check
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bsff-dist-and-evidence
          path: |
            dist/*
            artifacts/*.json
            artifacts/sbom.cdx.json

  nightly-extended:
    name: nightly-extended
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,stats,leakage]'
      - run: python -m pytest tests/ -v --tb=short
        env:
          BSFF_N_SURROGATES: "999"
          BSFF_N_PERMUTATIONS: "1000"
      - name: Full operating-characteristic calibration (drift check)
        run: python tools/calibrate_operating_characteristic.py
