name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,leakage]'
      - run: python -m pytest tests/ -v --tb=short --cov=bsff --cov-report=term-missing
      - run: bsff-validate --output artifacts/bsff_phase1_validation.json
      - run: python tools/validate_architecture_contract.py
      - run: python tools/validate_truth_contract.py
      - run: python tools/validate_open_source_readiness.py
      - run: python tools/check_github_actions_policy.py
      - run: python tools/scan_secrets.py
      - run: python tools/generate_provenance_manifest.py
      - run: python tools/validate_ip_provenance.py
      - run: python tools/validate_markdown.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: bsff-evidence-py${{ matrix.python-version }}
          path: |
            artifacts/bsff_phase1_validation.json
            artifacts/evidence_manifest.json
          if-no-files-found: warn

  build:
    name: build-package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install -e '.[dev,leakage]'
      - run: python tools/generate_evidence_bundle.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bsff-dist-and-evidence
          path: |
            dist/*
            artifacts/*.json

  nightly-extended:
    name: nightly-extended
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,stats,leakage]'
      - run: python -m pytest tests/ -v --tb=short
        env:
          BSFF_N_SURROGATES: "999"
          BSFF_N_PERMUTATIONS: "1000"
      - name: Full operating-characteristic calibration (drift check)
        run: python tools/calibrate_operating_characteristic.py
